<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header{
            position: sticky;
            top: 0;
            z-index: 2000;
            width: 100%;
            height: 15vh;
            background-color: purple;
            margin-bottom: 10px;
        }
        .container{
            position: relative;
            width: 95%;
            height: 80vh;
            background-color: yellow;
            margin: auto;
        }
        .left{
            position: absolute;
            width: 45%;
            height: 90%;
            background-color: green;
            margin: 20px;
        }
        .right{
            position: absolute;
            right: 0;
            width: 45%;
            height: 90%;
            background-color: rgb(73, 13, 97);
            margin: 20px;
        }
        .content{
            position: relative;
            width: 95%;
            background-color: rgb(209, 209, 161);
            margin: auto;
            margin-top: 10px;
            padding: 50px;
            border-radius: 50px;
            font-size: 30px;
            text-align: center;
        }
         footer{
            width: 100%;
            height: 10vh;
            background-color: rgb(32, 2, 32);
            margin-top: 10px;
        }
        img{
            position: fixed;
            z-index: 1000;
            bottom: 70px;
            right: 10px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <header class="header">
    </header>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="content">
        Welcome to sigma web development
    </div>
    <footer>
        
    </footer>
    <img src="../download (1).jpeg" alt="">
</body>
</html>
