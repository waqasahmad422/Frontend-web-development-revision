<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(207, 207, 207);
            /* margin: auto; */
        }
        .card{
            background-color: white;
            width: 250px;
            padding: 10px;
            border:1px solid black;
            margin: auto;
            border-radius: 15px;
        }
        .card img{
            width: 100%;
            border-radius: 15px;
        }
        .card .capsule span{
            display: inline-block;
            color: gray;
            border: 1px solid black;
            margin-top: 10px;
            padding: 3px 15px;
            border-radius: 20px;
            background-color: rgb(230, 236, 236);
        }

    </style>
</head>
<body>
    <article class="card">
        <header><img src="../download.jpeg" alt="hacker" class="card-img"></header>
        <div class="capsule">
            <span>hi</span>
            <span>hi</span>
        </div>
        <div class="card-itro">

        </div>

</html>
