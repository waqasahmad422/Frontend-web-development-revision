<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector</title>
    <style>
        /* Universal selector  */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* element selector  */
        h1{
            color: aqua;
        }

        /* class Selector  */
        .intro{
            color: tomato;
        }

        /* id selector  */
        #age{
            background-color: green;
            color: white;
        }
        #title{
            color: purple;
        }
        .h1{
            color: green;
        }
        h1{
            color: black;
        }
    </style>
</head>
<body>
    <h1 id="title" class="h1" >Waqas ahmad shah</h1>
    <p class="intro">I am student of BS computer science at university of peshawar</p>
    <span id="age">22</span>
</body>
</html>
