<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .box {
      background-color: red;
      border-radius: 50%;
      height: 75px;
      width: 75px;
      position: absolute;
      bottom: 0;
      left: 0;
      transition: all 3s ease;
      animation: waqas 3s linear infinite, waqasy 1s ease-out infinite alternate;
    }
    @keyframes waqas {
      from{
        left: 0;
      }
      to{
        left: 75%;
      }
    }
    @keyframes waqasy{
        from{
            bottom: 0;
        }
        to{
            bottom: 20%;
        }
    }
    .container {
      position: relative;
      height: 80vh;
      width: 80vw;
      background-color: rebeccapurple;
    }
  </style>
  <body>
    <div class="container">
      <div class="box"></div>
    </div>
  </body>
</html>
