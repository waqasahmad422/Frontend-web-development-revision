<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Design</title>
  </head>
  <body>
    <h1 align="center">Complete HTML Form</h1>

    <form action="#" method="post">
      <fieldset>
        <legend>Personal Information</legend>

        <label>Full Name:</label><br />
        <input
          type="text"
          name="name"
          placeholder="Enter name"
          required
        /><br /><br />

        <label>Email:</label><br />
        <input type="email" name="email" required /><br /><br />

        <label>Password:</label><br />
        <input type="password" name="password" /><br /><br />

        <label>Phone:</label><br />
        <input type="tel" name="phone" /><br /><br />

        <label>Age:</label><br />
        <input type="number" name="age" min="1" max="100" /><br /><br />

        <label>Date of Birth:</label><br />
        <input type="date" name="dob" /><br /><br />

        <label>Time:</label><br />
        <input type="time" name="time" /><br /><br />

        <label>Color:</label><br />
        <input type="color" name="color" /><br /><br />
      </fieldset>

      <br />

      <fieldset>
        <legend>Gender</legend>

        <input type="radio" name="gender" value="male" /> Male
        <input type="radio" name="gender" value="female" /> Female
        <input type="radio" name="gender" value="other" /> Other
      </fieldset>

      <br />

      <fieldset>
        <legend>Skills</legend>

        <input type="checkbox" name="html" /> HTML
        <input type="checkbox" name="css" /> CSS
        <input type="checkbox" name="js" /> JavaScript
        <input type="checkbox" name="php" /> PHP
      </fieldset>

      <br />

      <fieldset>
        <legend>Country & City</legend>

        <label>Country:</label><br />
        <select name="country">
          <option>Pakistan</option>
          <option>India</option>
          <option>USA</option></select
        ><br /><br />

        <label>City:</label><br />
        <input list="cities" name="city" />
        <datalist id="cities">
          <option value="Karachi"></option>
          <option value="Lahore"></option>
          <option value="Islamabad"></option>
        </datalist>
      </fieldset>

      <br />

      <fieldset>
        <legend>Upload</legend>

        <label>Upload File:</label><br />
        <input type="file" name="file" /><br /><br />

        <label>Range:</label><br />
        <input type="range" name="range" min="0" max="100" /><br /><br />

        <label>Search:</label><br />
        <input type="search" name="search" /><br /><br />

        <label>Website:</label><br />
        <input type="url" name="website" /><br /><br />
      </fieldset>

      <br />

      <fieldset>
        <legend>Message</legend>

        <textarea name="message" rows="5" cols="40"></textarea>
      </fieldset>

      <br />

      <input type="hidden" name="id" value="123" />

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
