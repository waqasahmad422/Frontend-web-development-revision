<!DOCTYPE html>
<!-- tells the browser that the document is written in HTML5 -->

<html lang="en">
<!-- This is the root element of the HTML page.
lang="en" specifies that the language of the page is English. -->

<head>
    <!-- The head section contains meta information about the webpage (not visible on the page). -->

    <meta charset="UTF-8">
    <!-- This sets the character encoding to UTF-8, allowing support for most languages and symbols. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This makes the website responsive on different devices like mobile phones. -->

    <title>Html basic Structure</title>
    <!-- This sets the title of the webpage, which appears on the browser tab. -->
</head>
<body>
    <!-- The body section contains all the visible content of the webpage. -->

    <h1>Hello word!</h1>
</body>
</html>
